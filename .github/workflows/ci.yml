name: Backend CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx eslint src/ --ext .js || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=moderate || true
      - name: Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [security]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t opm-backend:${{ github.sha }} .
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: opm-backend:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/opm-key.pem
          chmod 400 ~/.ssh/opm-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Package Application
        run: |
          tar --exclude='node_modules' --exclude='.git' --exclude='coverage' --exclude='.env' -czf backend.tar.gz .

      - name: Upload to EC2
        run: |
          scp -i ~/.ssh/opm-key.pem backend.tar.gz ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/app/

      - name: Deploy and Restart
        run: |
          ssh -i ~/.ssh/opm-key.pem ec2-user@${{ secrets.EC2_HOST }} << 'DEPLOY'
            cd /home/ec2-user/app
            tar -xzf backend.tar.gz
            rm backend.tar.gz
            npm install --production
            pm2 restart opm-backend || pm2 start server.js --name opm-backend
            sleep 3
            curl -sf http://localhost:5000/api/health || exit 1
            echo "Deployment successful!"
          DEPLOY

      - name: Verify Deployment
        run: |
          sleep 5
          curl -sf http://${{ secrets.EC2_HOST }}:5000/api/health
          echo "Health check passed!"
